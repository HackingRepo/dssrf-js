name: "Pull Request Labeler"
on:
  - pull_request_target

permissions:
  contents: none

jobs:
  label:
    permissions:
      contents: read
      pull-requests: write # Only give it exactly what it needs to label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@e52e4fb63ed5cd0e07abaad9826b2a893ccb921f # Pinned SHA
        with:
          repo-token: "${{ secrets.LABELER_TOKEN }}"
