name: Snyk Node Security Scan

on:
  push:
    branches: [ "main", "DSSRF_Branch_Rule" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '1 6 * * 2'

permissions: read-all

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
      security-events: write 
      actions: read 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a 

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Run Snyk Code (SAST)
        uses: snyk/actions/node@8e119fbb6c251787721d34ba683ed48eba792766 
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-results.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 
        if: always()
        with:
          sarif_file: snyk-results.sarif
